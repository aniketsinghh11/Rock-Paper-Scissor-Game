<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Stone Paper Scissor</title>
  </head>
  <body>
    <main>
      <h1>Stone Paper Scissor</h1>

      <div class="choices">
        <div class="choice" id="Rock">
          <img src="images/rock.png" alt="Stone" id="stone" />
        </div>
        <div class="choice" id="Paper">
          <img src="images/paper.png" alt="Paper" id="paper" />
        </div>
        <div class="choice" id="Scissors">
          <img src="images/scissors.png" alt="Scissor" id="scissor" />
        </div>
      </div>
      <div class="score-board">
        <div class="score">
          <p id="user-score">0</p>
          <p>You</p>
        </div>
        <div class="score">
          <p id="comp-score">0</p>
          <p>Computer</p>
        </div>
      </div>
      <div class="msg-container">
        <p class="msg">Play Your Move</p>
      </div>
    </main>

    <script src="main.js"></script>
  </body>
</html>
