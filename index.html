<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link rel="icon" type="image/png" href="images/faviconn.png" />
    <title>Stone Paper Scissor</title>
  </head>
  <body>
    <main>
      <h1>Stone Paper Scissor</h1>

      <div class="choices">
        <div class="choice" id="Rock">
          <img src="images/rock.png" alt="Stone" id="stone" />
        </div>
        <div class="choice" id="Paper">
          <img src="images/paper.png" alt="Paper" id="paper" />
        </div>
        <div class="choice" id="Scissors">
          <img src="images/scissors.png" alt="Scissor" id="scissor" />
        </div>
      </div>
      <div class="score-board">
        <div class="score">
          <p id="user-score">0</p>
          <p>You</p>
        </div>
        <div class="score">
          <p id="comp-score">0</p>
          <p>Computer</p>
        </div>
      </div>
      <div class="msg-container">
        <p class="msg">Play Your Move</p>
      </div>
    </main>
    <footer>
      <a
        href="https://github.com/yourusername"
        target="_blank"
        aria-label="GitHub"
      >
        <i class="fa-brands fa-github"></i>
      </a>

      <span>•</span>

      <a
        href="https://www.linkedin.com/in/yourusername/"
        target="_blank"
        aria-label="LinkedIn"
      >
        <i class="fa-brands fa-linkedin"></i>
      </a>

      <span>•</span>

      <span>Made by Aniket</span>
    </footer>

    <script src="main.js"></script>
  </body>
</html>
